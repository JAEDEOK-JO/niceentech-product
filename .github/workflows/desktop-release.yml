name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: npm run desktop:publish
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $exe = "release/NICEENTECH Setup $version.exe"
          $blockmap = "release/NICEENTECH Setup $version.exe.blockmap"
          $latest = "release/latest.yml"
          $publishDir = "release/publish-assets"
          New-Item -ItemType Directory -Force -Path $publishDir | Out-Null

          $publishExe = Join-Path $publishDir "NICEENTECH-Setup-$version.exe"
          $publishBlockmap = Join-Path $publishDir "NICEENTECH-Setup-$version.exe.blockmap"

          Copy-Item $exe $publishExe -Force
          Copy-Item $blockmap $publishBlockmap -Force

          gh release create "${{ github.ref_name }}" "$publishExe" "$publishBlockmap" "$latest" --repo JAEDEOK-JO/niceentech-product --title "${{ github.ref_name }}" --notes ""
