name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: npm run desktop:publish
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $packageJson = Get-Content "package.json" -Raw | ConvertFrom-Json
          $packageVersion = "$($packageJson.version)"
          if ($packageVersion -ne $version) {
            throw "Tag version ($version) and package.json version ($packageVersion) do not match."
          }

          $exe = Get-ChildItem "release" -Filter "*.exe" | Where-Object { $_.Name -like "NICEENTECH Setup *.exe" } | Select-Object -First 1
          $blockmap = Get-ChildItem "release" -Filter "*.exe.blockmap" | Where-Object { $_.Name -like "NICEENTECH Setup *.exe.blockmap" } | Select-Object -First 1
          $latest = Get-Item "release/latest.yml"

          if (-not $exe) {
            throw "Installer exe not found in release folder."
          }
          if (-not $blockmap) {
            throw "Blockmap file not found in release folder."
          }

          $publishDir = "release/publish-assets"
          New-Item -ItemType Directory -Force -Path $publishDir | Out-Null

          $publishExe = Join-Path $publishDir "NICEENTECH-Setup-$version.exe"
          $publishBlockmap = Join-Path $publishDir "NICEENTECH-Setup-$version.exe.blockmap"

          Copy-Item $exe.FullName $publishExe -Force
          Copy-Item $blockmap.FullName $publishBlockmap -Force

          gh release view "$tag" --repo JAEDEOK-JO/niceentech-product *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "$tag" "$publishExe" "$publishBlockmap" "$($latest.FullName)" --repo JAEDEOK-JO/niceentech-product --clobber
          } else {
            gh release create "$tag" "$publishExe" "$publishBlockmap" "$($latest.FullName)" --repo JAEDEOK-JO/niceentech-product --title "$tag" --notes ""
          }
