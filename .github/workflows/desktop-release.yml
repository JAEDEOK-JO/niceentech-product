name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: npm run desktop:publish
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Create public update release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASES_GH_TOKEN }}
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $exe = "release/NICEENTECH Setup $version.exe"
          $blockmap = "release/NICEENTECH Setup $version.exe.blockmap"
          $latest = "release/latest.yml"
          gh release create "${{ github.ref_name }}" "$exe" "$blockmap" "$latest" --repo JAEDEOK-JO/niceentech-product-updates --title "${{ github.ref_name }}" --notes ""
