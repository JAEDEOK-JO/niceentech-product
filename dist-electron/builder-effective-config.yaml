directories:
  output: dist-electron
  buildResources: build
appId: com.niceentech.product
productName: NICEENTECH
copyright: Copyright © 2025 NICEENTECH
files:
  - filter:
      - dist/**/*
      - electron/**/*
      - build/**/*
      - node_modules/**/*
      - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  - provider: generic
    url: https://joxfohziazjhscewifjj.supabase.co/storage/v1/object/public/update/
    channel: latest
electronVersion: 36.9.5
